<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Meta client reports</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .login-box { max-width: 22rem; margin: 2rem auto; padding: 1.5rem; border: 1px solid var(--border, #ddd); border-radius: 8px; background: var(--card, #fff); }
    .login-box label { display: block; margin-top: 0.75rem; font-size: 0.875rem; }
    .login-box input { width: 100%; margin-top: 0.25rem; padding: 0.5rem 0.6rem; box-sizing: border-box; }
    .login-box button { margin-top: 1rem; width: 100%; }
    .login-err { color: #b00020; font-size: 0.875rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Sign in</h1>
      <p>Client reports — use the credentials you were given.</p>
    </header>
    <div class="login-box">
      <form id="f" action="#" method="post">
        <label for="u">Username</label>
        <input id="u" name="username" type="text" autocomplete="username" required>
        <label for="p">Password</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required>
        <button class="btn" type="submit">Sign in</button>
        <p id="err" class="login-err" hidden></p>
      </form>
    </div>
    <footer class="portal-foot">
      <a href="index.html">Home</a> (requires login when the site is protected)
    </footer>
  </div>
  <script>
    (function () {
      var form = document.getElementById("f");
      var err = document.getElementById("err");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        err.hidden = true;
        var u = document.getElementById("u").value.trim();
        var p = document.getElementById("p").value;
        fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ username: u, password: p }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.error || r.statusText);
              return j;
            });
          })
          .then(function () {
            window.location.replace("index.html");
          })
          .catch(function (x) {
            err.textContent = x.message || "Sign-in failed";
            err.hidden = false;
          });
      });
    })();
  </script>
</body>
</html>
